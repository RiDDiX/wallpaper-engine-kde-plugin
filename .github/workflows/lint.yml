name: Lint

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  clang-format:
    name: clang-format check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: pip install clang-format==18.1.8

      - name: Check C++ formatting
        # --dry-run prints differences; --Werror turns any difference into a
        # non-zero exit code so the job fails on style violations.
        run: |
          find src \( -path "*/third_party/*" -prune \) -o \
            \( -name "*.cpp" -o -name "*.hpp" -o -name "*.h" \) -print | \
            xargs clang-format --dry-run --Werror
