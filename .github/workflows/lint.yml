name: Lint

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  clang-format:
    name: clang-format check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y clang-format-21
          sudo ln -sf /usr/bin/clang-format-21 /usr/bin/clang-format

      - name: Check C++ formatting
        # --dry-run prints differences; --Werror turns any difference into a
        # non-zero exit code so the job fails on style violations.
        run: |
          find src \( -path "*/third_party/*" -prune \) -o \
            \( -name "*.cpp" -o -name "*.hpp" -o -name "*.h" \) -print | \
            xargs clang-format --dry-run --Werror
